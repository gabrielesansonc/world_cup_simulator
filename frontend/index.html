<!DOCTYPE html>
<html lang="en" class="theme-yellow">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Gabarito:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<style>
/* ── Body override (data-dense app → 14px) ──────────────────────── */
body {
  font-size: 14px;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────────── */
header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .02em;
}
header .trophy {
  color: var(--accent);
  flex-shrink: 0;
}

/* ── Top control bar ─────────────────────────────────────────────── */
.controls {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
}

.mode-tabs {
  display: flex;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
  flex-shrink: 0;
}
.mode-tab {
  padding: 7px 14px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-sans);
  transition: background var(--transition-fast), color var(--transition-fast);
  white-space: nowrap;
}
.mode-tab.active { background: var(--accent); color: var(--text-inverse); }
.mode-tab:not(.active):hover { background: var(--bg-surface-2); color: var(--text-primary); }

.ctrl-sep {
  width: 1px;
  height: 28px;
  background: var(--border-default);
  flex-shrink: 0;
}

.ctrl-item {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.ctrl-item label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}
.ctrl-item select,
.ctrl-item input[type=number] {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 6px 10px;
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color var(--transition-fast);
  height: 34px;
}
.ctrl-item select:focus,
.ctrl-item input[type=number]:focus { border-color: var(--accent); }
.ctrl-item select { min-width: 180px; }
.ctrl-item input[type=number] { width: 90px; }

.ctrl-temp {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.ctrl-temp label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}
.ctrl-temp input[type=range] {
  width: 100px;
  accent-color: var(--accent);
  cursor: pointer;
}
.ctrl-temp .temp-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  min-width: 26px;
}

.btn-run {
  background: var(--accent);
  color: var(--text-inverse);
  border: none;
  border-radius: var(--radius-md);
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-sans);
  cursor: pointer;
  height: 34px;
  transition: opacity var(--transition-fast);
  letter-spacing: .02em;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: auto;
}
.btn-run:hover { opacity: .88; }
.btn-run:disabled { opacity: .45; cursor: not-allowed; }


/* ── ℹ Tooltips ──────────────────────────────────────────────────── */
.info-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  border: 1px solid var(--text-secondary);
  color: var(--text-secondary);
  font-size: 9px;
  font-weight: 700;
  cursor: default;
  flex-shrink: 0;
  position: relative;
  font-style: normal;
  line-height: 1;
  transition: border-color var(--transition-fast), color var(--transition-fast);
}
.info-icon:hover { border-color: var(--accent); color: var(--accent); }

.info-tip {
  position: fixed;
  z-index: 200;
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text-primary);
  line-height: 1.6;
  width: 300px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
  box-shadow: var(--shadow-md);
}
.info-tip.visible { opacity: 1; }
.info-tip-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--accent);
  margin-bottom: 6px;
}
.info-tip p { margin-bottom: 6px; color: var(--text-secondary); }
.info-tip p:last-child { margin-bottom: 0; }
.info-tip strong { color: var(--text-primary); font-weight: 600; }
.info-tip code {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-base);
  border: 1px solid var(--border-default);
  border-radius: 3px;
  padding: 6px 8px;
  display: block;
  margin: 6px 0;
  color: var(--color-success);
  white-space: normal;
  word-break: break-word;
  line-height: 1.7;
}

/* ── Progress bar ────────────────────────────────────────────────── */
.progress-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex: 1;
}
.progress-label {
  font-size: 13px;
  color: var(--text-secondary);
}
.progress-label strong { color: var(--text-primary); }
.progress-track {
  width: 320px;
  height: 6px;
  background: var(--bg-surface-2);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border-default);
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width .2s ease;
  width: 0%;
}

/* ── Main content ────────────────────────────────────────────────── */
.main {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── States ─────────────────────────────────────────────────────── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-secondary);
  text-align: center;
}
.empty-state .big-icon {
  color: var(--accent);
  opacity: 0.7;
}
.empty-state h2 { font-size: 18px; color: var(--text-primary); }

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border-default);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Section titles ─────────────────────────────────────────────── */
.section-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--accent);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-default);
  margin-bottom: 14px;
}

/* ── Podium ─────────────────────────────────────────────────────── */
.podium {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.podium-card {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  min-width: 140px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.podium-card.p1 { border-color: var(--accent); }
.podium-card.p2 { border-color: #aab0c0; }
.podium-card.p3 { border-color: #c08050; }
.podium-rank { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); }
.podium-card.p1 .podium-rank { color: var(--accent); }
.podium-team { font-size: 16px; font-weight: 700; }
.podium-card.p1 .podium-team { font-size: 18px; }

/* ── Group cards ─────────────────────────────────────────────────── */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.group-card {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.group-header {
  background: var(--bg-surface);
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--accent);
  border-bottom: 1px solid var(--border-default);
}
.group-table { width: 100%; border-collapse: collapse; }
.group-table th {
  font-size: 10px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 5px 8px;
  text-align: right;
  font-weight: 600;
}
.group-table th:first-child { text-align: left; }
.group-table td {
  padding: 6px 8px;
  text-align: right;
  border-top: 1px solid var(--border-default);
  font-size: 13px;
}
.group-table td:first-child { text-align: left; font-weight: 500; }
.group-table tr.qualified td { color: var(--color-success); }
.group-table tr.q3 td { color: #FF7400; }

/* ── 3rd place qualifiers ────────────────────────────────────────── */
.third-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.third-pill {
  background: var(--bg-surface-2);
  border: 1px solid #FF7400;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: #FF7400;
}
.third-pill span { color: var(--text-secondary); font-weight: 400; margin-left: 4px; }

/* ── Knockout rounds ─────────────────────────────────────────────── */
.ko-round { margin-bottom: 6px; }
.ko-round-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}
.match-card {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  overflow: hidden;
  font-size: 13px;
}
.match-team {
  flex: 1;
  padding: 9px 12px;
  font-weight: 500;
  transition: background var(--transition-fast);
}
.match-team.winner {
  background: rgba(34,211,160,.15);
  color: var(--color-success);
  font-weight: 700;
}
.match-vs {
  padding: 0 8px;
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.match-team.t2 { text-align: right; }

/* ── Frequency bracket (multi-run) ──────────────────────────────── */
.freq-matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}
.freq-card {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.freq-card-title {
  font-size: 10px;
  color: var(--text-secondary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}
.freq-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}
.freq-pct {
  min-width: 38px;
  font-weight: 700;
  color: var(--accent);
  font-size: 12px;
}
.freq-teams {
  flex: 1;
  color: var(--text-primary);
}
.freq-teams .sep { color: var(--text-secondary); margin: 0 4px; }

/* ── Group freq cards (multi-run) ───────────────────────────────── */
.grp-freq-card {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.grp-freq-header {
  background: var(--bg-surface);
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--accent);
  border-bottom: 1px solid var(--border-default);
}
.grp-freq-table { width: 100%; border-collapse: collapse; }
.grp-freq-table td {
  padding: 5px 10px;
  font-size: 12px;
  border-top: 1px solid var(--border-default);
  vertical-align: top;
}
.grp-freq-table td:first-child {
  color: var(--text-secondary);
  font-weight: 700;
  font-size: 11px;
  width: 28px;
  text-transform: uppercase;
}
.freq-team-row { display: flex; gap: 4px; flex-wrap: wrap; }
.freq-team-badge {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 11px;
  white-space: nowrap;
}
.freq-team-badge .pct { color: var(--accent); font-weight: 700; margin-left: 3px; }

/* ── Probability table ───────────────────────────────────────────── */
.prob-table-wrap { overflow-x: auto; }
.prob-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 480px;
}
.prob-table th {
  padding: 8px 12px;
  text-align: right;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-default);
  background: var(--bg-surface);
}
.prob-table th:first-child { text-align: left; }
.prob-table td {
  padding: 7px 12px;
  text-align: right;
  font-size: 13px;
  border-bottom: 1px solid var(--border-default);
}
.prob-table td:first-child { text-align: left; font-weight: 600; }
.prob-table tr:hover td { background: var(--bg-surface-2); }
.prob-cell { font-weight: 700; }
.prob-cell.hi  { color: var(--color-success); }
.prob-cell.mid { color: var(--accent); }
.prob-cell.lo  { color: var(--text-secondary); }
.prob-cell.zero { color: var(--border-default); }

/* ── Team stage chart ────────────────────────────────────────────── */
.team-chart-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.team-chart-controls label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.team-chart-controls select {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 8px 12px;
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  min-width: 200px;
  transition: border-color var(--transition-fast);
}
.team-chart-controls select:focus { border-color: var(--accent); }

.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 640px;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-label {
  width: 130px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-align: right;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.bar-track {
  flex: 1;
  height: 28px;
  background: var(--bg-surface-2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .4s ease;
  min-width: 2px;
}
.bar-pct {
  width: 46px;
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
}
.bar-empty { color: var(--text-secondary); font-style: italic; font-size: 13px; }

.bar-row { cursor: default; }
.bar-row:hover .bar-track { outline: 1px solid var(--accent); }

/* tooltip */
.chart-tooltip {
  position: fixed;
  z-index: 999;
  background: var(--bg-surface-2);
  border: 1px solid var(--accent);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
  min-width: 180px;
  box-shadow: var(--shadow-md);
}
.chart-tooltip.visible { opacity: 1; }
.chart-tooltip-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--accent);
  margin-bottom: 7px;
}
.chart-tooltip-row {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 2px 0;
  color: var(--text-primary);
}
.chart-tooltip-row .opp-pct {
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 11px;
  white-space: nowrap;
}
.chart-tooltip-none { color: var(--text-secondary); font-style: italic; }

/* ── Bracket View ────────────────────────────────────────────────── */
.bracket-wrap { overflow-x: auto; padding-bottom: 8px; }
.bracket {
  display: flex;
  gap: 20px;
  position: relative;
  align-items: stretch;
  min-width: max-content;
}
.bk-col {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  flex-shrink: 0;
}
.bk-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.bk-card {
  width: 100%;
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.bk-card .bk-team { flex: 1; display: flex; align-items: center; }
.bk-card-final { border-color: var(--accent); }
.bk-team {
  padding: 6px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
  font-size: 11px;
}
.bk-team.winner { color: var(--color-success); font-weight: 700; }
.bk-team.loser  { color: var(--text-secondary); }
.bk-divider { height: 1px; background: var(--border-default); }
.bk-card-multi { display: flex; flex-direction: column; justify-content: center; }
.bk-freq-row {
  display: flex;
  align-items: center;
  padding: 3px 7px;
  gap: 5px;
  border-bottom: 1px solid var(--border-default);
  font-size: 11px;
}
.bk-freq-row:last-child { border-bottom: none; }
.bk-pct  { min-width: 32px; font-weight: 700; color: var(--accent); flex-shrink: 0; font-size: 11px; }
.bk-match-teams { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
.bk-vs   { color: var(--text-secondary); margin: 0 2px; }
.bk-no-data { color: var(--text-secondary); font-size: 11px; text-align: center; padding: 6px; }
.bracket-labels { display: flex; gap: 20px; min-width: max-content; margin-top: 6px; }
.bk-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-secondary); text-align: center; flex-shrink: 0;
}

/* ── Podium sim table ────────────────────────────────────────────── */
.sim-table-wrap { overflow-x: auto; max-height: 360px; overflow-y: auto; }
.sim-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 400px;
}
.sim-table th {
  padding: 7px 10px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-default);
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 1;
}
.sim-table td {
  padding: 6px 10px;
  font-size: 12px;
  border-bottom: 1px solid var(--border-default);
}
.sim-table tr:hover td { background: var(--bg-surface-2); }
.sim-table td:first-child { color: var(--text-secondary); }

/* ── Expandable table rows ──────────────────────────────────────── */
.prob-table tr.hidden { display: none; }
.expand-btn {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 0;
  text-decoration: underline;
  transition: opacity var(--transition-fast);
}
.expand-btn:hover { opacity: 0.8; }

/* ── 3rd place match: text-only winner (no background) ────────────────── */
.match-team.winner-text {
  color: var(--color-success);
  font-weight: 700;
}
</style>

<body>

<header>
  <!-- Heroicons: Trophy -->

    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"></path>
    <path d="M9.212 4.486a.75.75 0 00-.577.21l-5.85 5.85a.75.75 0 101.06 1.061L8.7 6.587a.75.75 0 00-.488-1.101zM14.788 4.486a.75.75 0 01.577.21l5.85 5.85a.75.75 0 11-1.06 1.061l-5.85-5.85a.75.75 0 01.483-1.271z"></path>
    <path d="M6 9a3 3 0 00-3 3v6a3 3 0 003 3h12a3 3 0 003-3v-6a3 3 0 00-3-3"></path>
  </svg>

</header>

<!-- ── Top Controls ──────────────────────────────────────────────── -->
<div class="controls">

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-single" onclick="setMode('single')">Single Run</button>
    <button class="mode-tab"        id="tab-multi"  onclick="setMode('multi')">Multi Run</button>
  </div>
  <i class="info-icon" id="tip-mode-icon">i</i>

  <div class="ctrl-sep"></div>

  <div class="ctrl-item">
    <label>Model</label>
    <select id="sel-model"><option value="">Loading…</option></select>
    <i class="info-icon" id="tip-model-icon">i</i>
  </div>

  <!-- Single-only -->
  <div id="single-controls" class="ctrl-item">
    <label>Seed</label>
    <input type="number" id="inp-seed" placeholder="Random" min="0" />
  </div>

  <!-- Multi-only -->
  <div id="multi-controls" class="ctrl-item" style="display:none">
    <label>Simulations</label>
    <input type="number" id="inp-n" value="100" min="10" max="5000" step="10" />
  </div>

  <div class="ctrl-sep"></div>

  <div class="ctrl-temp">
    <label>Temperature</label>
    <i class="info-icon" id="tip-temp-icon">i</i>

  </div>

  <button class="btn-run" id="btn-run" onclick="run()">▶ Run</button>

</div>


<!-- ── Main ──────────────────────────────────────────────────────── -->
<main class="main" id="main">
  <div class="empty-state">
    <!-- Heroicons: Football (Soccer Ball) -->
    <svg class="big-icon" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M8.56 2.75c4.37 6.03 6.29 9.42 8.05 17.72m2.34-13.47c3.72 3.72 4.45 8.74 5.15 17.72M19.5 13.5c5.33 5.33 7.74 7.74 8.35 9.85"></path>
      <path d="M2 12a10 10 0 0110-10 10 10 0 0110 10"></path>
    </svg>
    <h2>Ready to simulate</h2>
    <p>Choose a model and hit Run.</p>
  </div>
</main>

<!-- ── Tooltips ───────────────────────────────────────────────────── -->
<div class="info-tip" id="tip-mode"></div>
<div class="info-tip" id="tip-model"></div>
<div class="info-tip" id="tip-temp"></div>

<script>
// ── State ────────────────────────────────────────────────────────
let mode = 'single';

function setMode(m) {
  mode = m;
  document.getElementById('tab-single').classList.toggle('active', m === 'single');
  document.getElementById('tab-multi').classList.toggle('active',  m === 'multi');
  document.getElementById('single-controls').style.display = m === 'single' ? 'flex' : 'none';
  document.getElementById('multi-controls').style.display  = m === 'multi'  ? 'flex' : 'none';
}

// ── Info tooltips ─────────────────────────────────────────────────
const _TIPS = {
  'tip-mode': {
    title: 'Single Run vs Multi Run',
    html: `
      <p><strong>Single Run</strong> simulates one complete World Cup end-to-end. Every match is played once using the model's probabilities. Great for exploring a plausible tournament path.</p>
      <p><strong>Multi Run</strong> simulates the tournament N times and aggregates the results — showing championship probabilities, most likely bracket matchups, and how far each team typically goes.</p>
      <p>Use <strong>Single</strong> to tell a story. Use <strong>Multi</strong> to find patterns.</p>
    `
  },
  'tip-model': {
    title: 'AI Model Probabilities',
    html: `
      <p>Each model is an AI that rated the win/draw/loss probability for every possible match between the 48 teams.</p>
      <p>These are <strong>static ratings</strong> — no live API calls are made during simulation. The models were queried once and their probabilities saved.</p>
      <p><strong>Average (Consensus)</strong> is the equal-weight average across all five models — a good neutral baseline.</p>
    `
  },
  'tip-temp': {
    title: 'Temperature',
    html: `
      <p>Temperature reshapes the model's probabilities before simulating — borrowed from how LLMs control output randomness.</p>
      <code>p_i = exp(log(p_i) / T) / Σ exp(log(p_j) / T)</code>
      <p><strong>T &lt; 1</strong> sharpens the odds — favourites win more reliably, fewer upsets.</p>
      <p><strong>T = 1</strong> uses the model's probabilities unchanged.</p>
      <p><strong>T &gt; 1</strong> flattens the odds — more chaos, anyone can win.</p>
      <p>Based on experience, <strong>T = 0.7</strong> is a sweet spot: it respects the model's rankings while keeping the bracket realistic and not too deterministic.</p>
    `
  }
};

let _activeTip = null;

function _closeAllTips() {
  document.querySelectorAll('.info-tip.visible').forEach(t => t.classList.remove('visible'));
  _activeTip = null;
}

(function initTips() {
  const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

  Object.keys(_TIPS).forEach(tipId => {
    const icon = document.getElementById(tipId + '-icon');
    const tip  = document.getElementById(tipId);
    if (!icon || !tip) return;
    const { title, html } = _TIPS[tipId];
    tip.innerHTML = `<div class="info-tip-title">${title}</div>${html}`;

    // ── Desktop: hover ───────────────────────────────────────────
    icon.addEventListener('mouseenter', e => {
      if (isTouchDevice()) return;
      tip.classList.add('visible');
      _posTip(e, tip);
    });
    icon.addEventListener('mousemove', e => {
      if (isTouchDevice()) return;
      _posTip(e, tip);
    });
    icon.addEventListener('mouseleave', () => {
      if (isTouchDevice()) return;
      tip.classList.remove('visible');
    });

    // ── Mobile: tap to open, tap again / outside to close ────────
    icon.addEventListener('touchend', e => {
      e.preventDefault(); // prevent ghost click
      e.stopPropagation();
      const isOpen = tip.classList.contains('visible');
      _closeAllTips();
      if (!isOpen) {
        tip.classList.add('visible');
        _activeTip = tip;
        // position centred below the icon, clamped to viewport
        const r  = icon.getBoundingClientRect();
        const tw = 300;
        const th = tip.scrollHeight || 200;
        const x  = Math.min(Math.max(r.left + r.width / 2 - tw / 2, 8), window.innerWidth - tw - 8);
        const y  = r.bottom + 8 + window.scrollY;
        tip.style.position = 'absolute';
        tip.style.left = x + 'px';
        tip.style.top  = y + 'px';
      }
    });
  });

  // Tap anywhere else closes open tip on mobile
  document.addEventListener('touchend', e => {
    if (_activeTip && !e.target.closest('.info-icon')) {
      _closeAllTips();
    }
  });
})();

function _posTip(e, tip) {
  const x  = e.clientX + 14;
  const y  = e.clientY + 14;
  const tw = tip.offsetWidth  || 300;
  const th = tip.offsetHeight || 120;
  tip.style.position = 'fixed';
  tip.style.left = (x + tw > window.innerWidth  ? e.clientX - tw - 8 : x) + 'px';
  tip.style.top  = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
}

// ── Bootstrap ────────────────────────────────────────────────────
async function init() {
  try {
    const res   = await fetch('/api/models');
    const models = await res.json();
    const sel   = document.getElementById('sel-model');
    sel.innerHTML = models.map(m =>
      `<option value="${m.id}">${m.name}</option>`
    ).join('');
  } catch (e) {
    console.error('Failed to load models', e);
  }
}
init();

// ── Run ──────────────────────────────────────────────────────────
async function run() {
  const btn   = document.getElementById('btn-run');
  const main  = document.getElementById('main');
  const model = document.getElementById('sel-model').value;
  const temp  = parseFloat(document.getElementById('inp-temp').value);

  btn.disabled = true;
  main.innerHTML = `<div class="empty-state"><p>Simulating…</p></div>`;

  try {
    if (mode === 'single') {
      const seedRaw = document.getElementById('inp-seed').value.trim();
      const body = { model, temperature: temp };
      if (seedRaw !== '') body.seed = parseInt(seedRaw);
      const res  = await fetch('/api/simulate/single', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      renderSingle(data);
    } else {
      const n = parseInt(document.getElementById('inp-n').value) || 100;
      if (n > 5000) {
        document.getElementById('inp-n').value = 5000;
        main.innerHTML = `<div class="empty-state"><p style="color:var(--color-error)">Whoa, slow down there! Keep it under 5k.</p></div>`;
        btn.disabled = false;
        return;
      }
      await runMultiStream(model, n, temp);
    }
  } catch (e) {
    main.innerHTML = `<div class="empty-state"><p style="color:var(--color-error)">Error: ${e.message}</p></div>`;
  } finally {
    btn.disabled = false;
  }
}

// ── Multi-run SSE stream ─────────────────────────────────────────
async function runMultiStream(model, n, temp) {
  const main = document.getElementById('main');

  // show progress UI
  main.innerHTML = `
    <div class="empty-state progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="progress-label" id="prog-label">Starting…</div>
    </div>
  `;

  const res = await fetch('/api/simulate/multiple/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ model, n, temperature: temp }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    // SSE lines: "data: {...}\n\n"
    const parts = buf.split('\n\n');
    buf = parts.pop(); // keep incomplete chunk

    for (const part of parts) {
      if (!part.startsWith('data: ')) continue;
      const msg = JSON.parse(part.slice(6));

      if (msg.progress !== undefined) {
        const pct = (msg.progress / msg.total * 100).toFixed(1);
        const fill = document.getElementById('prog-fill');
        const label = document.getElementById('prog-label');
        if (fill)  fill.style.width = pct + '%';
        if (label) label.innerHTML = `<strong>${msg.progress.toLocaleString()}</strong> / ${msg.total.toLocaleString()} simulations&nbsp;&nbsp;${pct}%`;
      }

      if (msg.result) {
        renderMulti(msg.result);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  SINGLE SIMULATION RENDER
// ═══════════════════════════════════════════════════════════════

function renderSingle(d) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  main.appendChild(sectionPodium(d.podium));
  main.appendChild(sectionGroups(d.groups));
  main.appendChild(sectionThirdQualifiers(d.third_place_qualifiers));
  main.appendChild(sectionBracket(d, false));
  main.appendChild(sectionKO('Third-Place Match', [d.third_place_match], true));
}

function sectionPodium(podium) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">Final Results</div>`;
  const pod = el('div', 'podium');
  const places = [
    { cls: 'p1', rank: '🥇 Champion',   team: podium.champion },
    { cls: 'p2', rank: '🥈 Runner-up',  team: podium.runner_up },
    { cls: 'p3', rank: '🥉 Third Place',team: podium.third },
    { cls: '',   rank: '4th Place',      team: podium.fourth },
  ];
  places.forEach(p => {
    const card = el('div', `podium-card ${p.cls}`);
    card.innerHTML = `<div class="podium-rank">${p.rank}</div><div class="podium-team">${p.team}</div>`;
    pod.appendChild(card);
  });
  sec.appendChild(pod);
  return sec;
}

function sectionGroups(groups) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">Group Stage</div>`;
  const grid = el('div', 'groups-grid');
  const groupOrder = 'ABCDEFGHIJKL'.split('');
  groupOrder.forEach(g => {
    if (!groups[g]) return;
    const gd = groups[g];
    const card = el('div', 'group-card');
    card.innerHTML = `<div class="group-header">Group ${g}</div>`;
    const tbl = el('table', 'group-table');
    tbl.innerHTML = `
      <thead><tr>
        <th>Team</th><th>Pts</th><th>GF</th><th>GA</th><th>GD</th>
      </tr></thead>
    `;
    const tbody = el('tbody');
    gd.standings.forEach(s => {
      const tr = el('tr');
      if (s.rank <= 2) tr.classList.add('qualified');
      else if (s.rank === 3) tr.classList.add('q3');
      tr.innerHTML = `<td>${s.team}</td><td>${s.pts}</td><td>${s.gf}</td><td>${s.ga}</td><td>${s.gd > 0 ? '+' : ''}${s.gd}</td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    card.appendChild(tbl);
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  return sec;
}

function sectionThirdQualifiers(thirds) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">3rd-Place Qualifiers (Best 8 of 12)</div>`;
  const grid = el('div', 'third-grid');
  thirds.forEach((t, i) => {
    const pill = el('div', 'third-pill');
    pill.innerHTML = `${i + 1}. ${t.team}<span>Grp ${t.group} · ${t.pts}pts · GD ${t.gd > 0 ? '+' : ''}${t.gd}</span>`;
    grid.appendChild(pill);
  });
  sec.appendChild(grid);
  return sec;
}

function sectionKO(title, matches, textOnlyWinner = false) {
  const sec = el('div', 'ko-round');
  sec.innerHTML = `<div class="section-title">${title}</div>`;
  const grid = el('div', 'matches-grid');
  matches.forEach((m, i) => {
    const card = el('div', 'match-card');
    const isT1 = m.winner === m.t1;
    const winClass = textOnlyWinner ? 'winner-text' : 'winner';
    card.innerHTML = `
      <div class="match-team t1${isT1 ? ' ' + winClass : ''}">${m.t1}</div>
      <div class="match-vs">vs</div>
      <div class="match-team t2${!isT1 ? ' ' + winClass : ''}">${m.t2}</div>
    `;
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  return sec;
}

// ═══════════════════════════════════════════════════════════════
//  MULTI SIMULATION RENDER
// ═══════════════════════════════════════════════════════════════

function renderMulti(d) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  main.appendChild(sectionProbTable(d.probabilities, d.n));
  main.appendChild(sectionGroupFrequencies(d.group_frequencies));
  main.appendChild(sectionBracket(d, true));
  main.appendChild(sectionFreqKO('Third-Place Match',  d.bracket_top3.third_place));
  main.appendChild(sectionTeamStageChart(d.team_stage_probs, d.team_stage_opponents));
}

function sectionProbTable(probs, n) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">Podium Probabilities — ${n} simulations (teams with ≥ 1%)</div>`;
  const wrap = el('div', 'prob-table-wrap');
  if (!probs.length) {
    wrap.textContent = 'No data.';
    sec.appendChild(wrap);
    return sec;
  }

  const isExpanded = [false]; // closure var to track state
  const tbl = el('table', 'prob-table');
  tbl.innerHTML = `
    <thead><tr>
      <th>Team</th>
      <th>Champion</th><th>Runner-up</th><th>3rd</th><th>4th</th><th>Top 4</th>
    </tr></thead>
  `;
  const tbody = el('tbody');

  probs.forEach((p, idx) => {
    const tr = el('tr');
    // hide rows beyond top 10
    if (idx >= 10) tr.classList.add('hidden');
    tr.innerHTML = `
      <td>${p.team}</td>
      ${pctCell(p.champion)}
      ${pctCell(p.runner_up)}
      ${pctCell(p.third)}
      ${pctCell(p.fourth)}
      ${pctCell(p.top4)}
    `;
    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody);
  wrap.appendChild(tbl);

  // Add expand button if there are more than 10 teams
  if (probs.length > 10) {
    const expandBtn = el('button', 'expand-btn');
    expandBtn.textContent = `Show all ${probs.length} teams`;
    expandBtn.onclick = () => {
      isExpanded[0] = !isExpanded[0];
      const hiddenRows = tbl.querySelectorAll('tbody tr.hidden');
      hiddenRows.forEach(row => {
        if (isExpanded[0]) {
          row.classList.remove('hidden');
        } else {
          row.classList.add('hidden');
        }
      });
      expandBtn.textContent = isExpanded[0] ? `Show top 10 teams` : `Show all ${probs.length} teams`;
    };
    wrap.appendChild(expandBtn);
  }

  sec.appendChild(wrap);
  return sec;
}

function pctCell(v) {
  const cls = v === 0 ? 'zero' : v >= 20 ? 'hi' : v >= 5 ? 'mid' : 'lo';
  return `<td><span class="prob-cell ${cls}">${v > 0 ? v + '%' : '—'}</span></td>`;
}

function sectionGroupFrequencies(gf) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">Group Stage — Most Likely Finishes</div>`;
  const grid = el('div', 'groups-grid');
  'ABCDEFGHIJKL'.split('').forEach(g => {
    if (!gf[g]) return;
    const card = el('div', 'grp-freq-card');
    card.innerHTML = `<div class="grp-freq-header">Group ${g}</div>`;
    const tbl = el('table', 'grp-freq-table');
    const tbody = el('tbody');
    ['1','2','3','4'].forEach(pos => {
      const teams = gf[g][pos] || [];
      const tr = el('tr');
      const badges = teams.map(t =>
        `<span class="freq-team-badge">${t.team}<span class="pct">${t.pct}%</span></span>`
      ).join('');
      tr.innerHTML = `<td>${pos}${pos==='1'?'st':pos==='2'?'nd':pos==='3'?'rd':'th'}</td><td><div class="freq-team-row">${badges}</div></td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    card.appendChild(tbl);
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  return sec;
}

function sectionFreqKO(title, slots) {
  const sec = el('div', 'ko-round');
  sec.innerHTML = `<div class="section-title">${title}</div>`;
  const grid = el('div', 'freq-matches-grid');
  slots.forEach((top3, i) => {
    const card = el('div', 'freq-card');
    card.innerHTML = `<div class="freq-card-title">Match ${i + 1}</div>`;
    if (!top3.length) {
      card.innerHTML += `<div style="color:var(--text-secondary);font-size:12px">No data</div>`;
    } else {
      top3.forEach(row => {
        const r = el('div', 'freq-row');
        r.innerHTML = `
          <span class="freq-pct">${row.pct}%</span>
          <span class="freq-teams">${row.t1}<span class="sep">vs</span>${row.t2}</span>
        `;
        card.appendChild(r);
      });
    }
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  return sec;
}

// ── Stage colours (groups→final) ────────────────────────────────
const STAGE_COLORS = {
  groups: '#F87171',
  r32:    '#FF7400',
  r16:    '#FFE600',
  qf:     '#9FD800',
  sf:     '#60A5FA',
  final:  '#22D3A0',
};
const STAGE_LABELS = {
  groups: 'Group Stage',
  r32:    'Round of 32',
  r16:    'Round of 16',
  qf:     'Quarter-Finals',
  sf:     'Semi-Finals',
  final:  'Final',
};

// ── Shared tooltip element ───────────────────────────────────────
const _tooltip = el('div', 'chart-tooltip');
document.addEventListener('DOMContentLoaded', () => document.body.appendChild(_tooltip));
// also append immediately in case DOMContentLoaded already fired
document.body.appendChild(_tooltip);

function _showTooltip(e, stage, opponents) {
  const opps = opponents || [];
  _tooltip.innerHTML = `
    <div class="chart-tooltip-title">Top opponents — ${STAGE_LABELS[stage]}</div>
    ${opps.length
      ? opps.map(o => `
          <div class="chart-tooltip-row">
            <span>${o.team}</span>
            <span class="opp-pct">${o.pct}% of sims</span>
          </div>`).join('')
      : '<div class="chart-tooltip-none">No data</div>'
    }
  `;
  _positionTooltip(e);
  _tooltip.classList.add('visible');
}

function _positionTooltip(e) {
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  const tw = _tooltip.offsetWidth  || 200;
  const th = _tooltip.offsetHeight || 80;
  _tooltip.style.left = (x + tw > window.innerWidth  ? e.clientX - tw - 8 : x) + 'px';
  _tooltip.style.top  = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
}

function _hideTooltip() { _tooltip.classList.remove('visible'); }

function sectionTeamStageChart(teamStageProbs, teamStageOpponents) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">Team Elimination Stage</div>`;

  const teams = Object.keys(teamStageProbs).sort();

  const ctrl = el('div', 'team-chart-controls');
  ctrl.innerHTML = `
    <label>Select Team</label>
    <select id="team-stage-sel">
      <option value="">— choose a team —</option>
      ${teams.map(t => `<option value="${t}">${t}</option>`).join('')}
    </select>
  `;
  sec.appendChild(ctrl);

  const chartWrap = el('div');
  chartWrap.id = 'team-stage-chart';
  chartWrap.innerHTML = `<div class="bar-empty">Select a team to see their elimination probability by stage.</div>`;
  sec.appendChild(chartWrap);

  ctrl.querySelector('#team-stage-sel').addEventListener('change', function () {
    renderTeamChart(this.value, teamStageProbs, teamStageOpponents);
  });

  return sec;
}

function renderTeamChart(team, teamStageProbs, teamStageOpponents) {
  const wrap = document.getElementById('team-stage-chart');
  if (!team) {
    wrap.innerHTML = `<div class="bar-empty">Select a team to see their elimination probability by stage.</div>`;
    return;
  }
  const stages  = ['groups', 'r32', 'r16', 'qf', 'sf', 'final'];
  const data    = teamStageProbs[team]    || {};
  const oppData = teamStageOpponents[team] || {};
  const maxPct  = Math.max(...stages.map(s => data[s] || 0), 1);

  const chart = el('div', 'bar-chart');
  stages.forEach(s => {
    const pct  = data[s] || 0;
    const opps = oppData[s] || [];
    const row  = el('div', 'bar-row');
    row.innerHTML = `
      <div class="bar-label">${STAGE_LABELS[s]}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(pct / maxPct * 100).toFixed(1)}%;background:${STAGE_COLORS[s]}"></div>
      </div>
      <div class="bar-pct">${pct > 0 ? pct + '%' : '—'}</div>
    `;
    row.addEventListener('mouseenter', e => _showTooltip(e, s, opps));
    row.addEventListener('mousemove',  e => _positionTooltip(e));
    row.addEventListener('mouseleave', _hideTooltip);
    chart.appendChild(row);
  });

  wrap.innerHTML = '';
  wrap.appendChild(chart);
}

// ═══════════════════════════════════════════════════════════════
//  BRACKET VIEW
// ═══════════════════════════════════════════════════════════════

const BK_CARD_W_S = 155;   // single card width
const BK_CARD_W_M = 175;   // multi card width
const BK_CARD_H_S = 64;    // single card height
const BK_CARD_H_M = 71;    // multi card height (3 rows)
const BK_COL_GAP  = 20;    // gap between columns (connector runway)
const BK_H_S      = 640;   // single bracket total height (8 × 80px slots)
const BK_H_M      = 648;   // multi bracket total height  (8 × 81px slots)

const BK_ROUND_LABELS = { r32: 'R32', r16: 'R16', qf: 'QF', sf: 'SF', final: 'Final' };

function _bkSliceSingle(d) {
  return {
    r32:   { L: d.r32.slice(0, 8),              R: d.r32.slice(8, 16)            },
    r16:   { L: d.r16.slice(0, 4),              R: d.r16.slice(4, 8)             },
    qf:    { L: d.qf.slice(0, 2),               R: d.qf.slice(2, 4)              },
    sf:    { L: [d.sf[0]],                       R: [d.sf[1]]                     },
    final: d.final,
  };
}
function _bkSliceMulti(d) {
  const b = d.bracket_top3;
  return {
    r32:   { L: b.r32.slice(0, 8),              R: b.r32.slice(8, 16)            },
    r16:   { L: b.r16.slice(0, 4),              R: b.r16.slice(4, 8)             },
    qf:    { L: b.qf.slice(0, 2),               R: b.qf.slice(2, 4)              },
    sf:    { L: [b.sf[0]],                       R: [b.sf[1]]                     },
    final: b.final[0],
  };
}

function sectionBracket(d, multi) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">Tournament Bracket</div>`;

  const slices = multi ? _bkSliceMulti(d) : _bkSliceSingle(d);
  const bkH    = multi ? BK_H_M : BK_H_S;
  const cardW  = multi ? BK_CARD_W_M : BK_CARD_W_S;
  const cardH  = multi ? BK_CARD_H_M : BK_CARD_H_S;

  const wrap = el('div', 'bracket-wrap');
  const bk   = el('div', 'bracket');
  bk.style.height = bkH + 'px';

  // SVG overlay (drawn after layout)
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
  bk.appendChild(svg);

  const colOrder = ['r32', 'r16', 'qf', 'sf'];     // left: outer → inner
  const colOrderR = ['sf', 'qf', 'r16', 'r32'];     // right: inner → outer

  const labels = el('div', 'bracket-labels');

  colOrder.forEach(r => {
    bk.appendChild(_bkCol(slices[r].L, r, 'L', bkH, cardW, cardH, multi));
    labels.appendChild(_bkLabelCell(BK_ROUND_LABELS[r], cardW));
  });
  bk.appendChild(_bkFinalCol(slices.final, bkH, cardW, cardH, multi));
  labels.appendChild(_bkLabelCell(BK_ROUND_LABELS.final, cardW));
  colOrderR.forEach(r => {
    bk.appendChild(_bkCol(slices[r].R, r, 'R', bkH, cardW, cardH, multi));
    labels.appendChild(_bkLabelCell(BK_ROUND_LABELS[r], cardW));
  });

  wrap.appendChild(bk);
  wrap.appendChild(labels);
  sec.appendChild(wrap);

  requestAnimationFrame(() => _drawBkConnectors(bk, svg));
  return sec;
}

function _bkLabelCell(text, w) {
  const d = el('div', 'bk-label');
  d.style.width = w + 'px';
  d.textContent = text;
  return d;
}

function _bkCol(matches, round, side, bkH, cardW, cardH, multi) {
  const col = el('div', 'bk-col');
  col.style.width = cardW + 'px';
  matches.forEach((m, i) => {
    const slot = el('div', 'bk-slot');
    slot.style.height = (bkH / matches.length) + 'px';
    const card = multi ? _bkCardMulti(m, round, side, i, cardH) : _bkCardSingle(m, round, side, i, cardH);
    slot.appendChild(card);
    col.appendChild(slot);
  });
  return col;
}

function _bkFinalCol(match, bkH, cardW, cardH, multi) {
  const col = el('div', 'bk-col');
  col.style.width = cardW + 'px';
  const slot = el('div', 'bk-slot');
  slot.style.height = bkH + 'px';
  const card = multi ? _bkCardMulti(match, 'final', 'C', 0, cardH) : _bkCardSingle(match, 'final', 'C', 0, cardH);
  card.classList.add('bk-card-final');
  slot.appendChild(card);
  col.appendChild(slot);
  return col;
}

function _bkCardSingle(m, round, side, idx, cardH) {
  const card = el('div', 'bk-card');
  card.dataset.bk = `${side}-${round}-${idx}`;
  card.style.height = cardH + 'px';
  const isT1 = m.winner === m.t1;
  card.innerHTML = `
    <div class="bk-team ${isT1 ? 'winner' : 'loser'}">${m.t1}</div>
    <div class="bk-divider"></div>
    <div class="bk-team ${!isT1 ? 'winner' : 'loser'}">${m.t2}</div>
  `;
  return card;
}

function _bkCardMulti(rows, round, side, idx, cardH) {
  const card = el('div', 'bk-card bk-card-multi');
  card.dataset.bk = `${side}-${round}-${idx}`;
  card.style.height = cardH + 'px';
  if (!rows || !rows.length) {
    card.innerHTML = `<div class="bk-no-data">—</div>`;
    return card;
  }
  card.innerHTML = rows.map(r =>
    `<div class="bk-freq-row">
       <span class="bk-pct">${r.pct}%</span>
       <span class="bk-match-teams">${r.t1}<span class="bk-vs">vs</span>${r.t2}</span>
     </div>`
  ).join('');
  return card;
}

function _drawBkConnectors(bk, svg) {
  const bkRect = bk.getBoundingClientRect();

  function pos(id) {
    const node = bk.querySelector(`[data-bk="${id}"]`);
    if (!node) return null;
    const r = node.getBoundingClientRect();
    return {
      left:  r.left  - bkRect.left,
      right: r.right - bkRect.left,
      cy:    r.top   - bkRect.top + r.height / 2,
    };
  }

  const S  = 'stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"';
  const lines = [];

  // Pair connections within one side (0-based local indices, same pattern L & R)
  const pairs = [
    ...Array.from({length: 4}, (_, k) => [`r32-${2*k}`, `r32-${2*k+1}`, `r16-${k}`]),
    ...Array.from({length: 2}, (_, k) => [`r16-${2*k}`, `r16-${2*k+1}`, `qf-${k}`]),
    ['qf-0', 'qf-1', 'sf-0'],
  ];

  ['L', 'R'].forEach(side => {
    const left = side === 'L';

    pairs.forEach(([c1id, c2id, pid]) => {
      const c1 = pos(`${side}-${c1id}`);
      const c2 = pos(`${side}-${c2id}`);
      const p  = pos(`${side}-${pid}`);
      if (!c1 || !c2 || !p) return;

      // midX sits in the column gap between children and parent
      const midX = left ? (c1.right + p.left) / 2 : (c1.left + p.right) / 2;
      const cx   = left ? 'right' : 'left';
      const px   = left ? 'left'  : 'right';

      lines.push(`<line ${S} x1="${c1[cx]}" y1="${c1.cy}" x2="${midX}" y2="${c1.cy}" />`);
      lines.push(`<line ${S} x1="${c2[cx]}" y1="${c2.cy}" x2="${midX}" y2="${c2.cy}" />`);
      lines.push(`<line ${S} x1="${midX}"   y1="${c1.cy}" x2="${midX}" y2="${c2.cy}" />`);
      lines.push(`<line ${S} x1="${midX}"   y1="${p.cy}"  x2="${p[px]}" y2="${p.cy}" />`);
    });

    // SF → Final
    const sf  = pos(`${side}-sf-0`);
    const fin = pos('C-final-0');
    if (sf && fin) {
      const fx = left ? fin.left : fin.right;
      lines.push(`<line ${S} x1="${left ? sf.right : sf.left}" y1="${sf.cy}" x2="${fx}" y2="${fin.cy}" />`);
    }
  });

  svg.innerHTML = `<g>${lines.join('')}</g>`;
}

function sectionSimTable(rows) {
  const sec = el('div');
  sec.innerHTML = `<div class="section-title">All Simulation Results</div>`;
  const wrap = el('div', 'sim-table-wrap');
  const tbl  = el('table', 'sim-table');
  tbl.innerHTML = `
    <thead><tr>
      <th>#</th><th>Champion</th><th>Runner-up</th><th>3rd</th><th>4th</th>
    </tr></thead>
  `;
  const tbody = el('tbody');
  rows.forEach(r => {
    const tr = el('tr');
    tr.innerHTML = `<td>${r.sim}</td><td>${r.champion}</td><td>${r.runner_up}</td><td>${r.third}</td><td>${r.fourth}</td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  sec.appendChild(wrap);
  return sec;
}

// ── Utility ──────────────────────────────────────────────────────
function el(tag, cls = '') {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
